name: Generate Snake
#controls the schedule.
on:
  schedule:
    - cron: "0 */3 * * *"  # Runs every 12 hours
  workflow_dispatch:
#Sets the workflow permissions granted to the Github_token.
permissions:
  contents: write
  pages: write
#bypasses the upcoming update for September 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
#specifies the type of virtual machine runner.
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

    #creates the dist directory.
      - name: Create dist directory
        run: mkdir -p dist
     #generates snake type, snake colour and light mode.
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: Coding89
          args: >
            --svg-out-path dist/github-contribution-grid-snake.svg
            --gif-out-path dist/github-contribution-grid-snake.gif
            --snake-color "#FF00FF"
            --snake-head-color "#FFD700"
            --snake-tail-color "#FFFF00"
     #generates snake type, snake colour and dark mode.
      - uses: Platane/snk@v3
        with:
          github_user_name: Coding89
          args: >
            --svg-out-path dist/github-contribution-grid-snake-dark.svg
            --snake-color "#FF00FF"
            --snake-head-color "#FFD700"
            --snake-tail-color "#FFFF00"
            --palette github-dark
#Deploys the generated images to a separate branch.
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
